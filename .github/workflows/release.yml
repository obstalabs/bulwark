name: Release

# Build release binaries on a version tag and publish a GitHub Release on this
# repo. Source and artifacts now live together (the project is open source), so the
# release is created in-repo with the built-in token — no cross-repo PAT.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DIST_REPO: ${{ github.repository }}

jobs:
  build-linux:
    name: build linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
            static: false
          - target: aarch64-unknown-linux-gnu
            cross: true
            static: false
          # Static musl gates are the streamable Linux payloads.
          - target: x86_64-unknown-linux-musl
            cross: true
            static: true
          - target: aarch64-unknown-linux-musl
            cross: true
            static: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Assert static linkage (musl)
        if: matrix.static
        run: |
          bin="target/${{ matrix.target }}/release/bulwark"
          file "$bin"
          # Modern Rust+musl emits "static-pie linked" (a static position-independent
          # executable); older toolchains say "statically linked". Both are fully
          # static. Accept either, and let `ldd` be the authoritative no-deps gate.
          if ! file "$bin" | grep -qiE "statically linked|static-pie linked"; then
            echo "::error::${{ matrix.target }}: file() does not report a static binary"
            file "$bin"
            exit 1
          fi
          # Authoritative no-deps gate, phrasing-agnostic: a static binary has NO
          # shared-library mappings. ldd prints those as "lib... => /path" lines
          # (and may say "not a dynamic executable" or "statically linked" instead).
          # So: pass iff ldd shows no "=>" dependency line.
          ldd "$bin" > ldd.out 2>&1 || true
          if grep -q "=>" ldd.out; then
            echo "::error::${{ matrix.target }} is not a fully static binary (has dynamic deps)"
            cat ldd.out
            exit 1
          fi

      - name: Package
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="bulwark-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/bulwark" "dist/${name}/"
          cp README.md LICENSE CHANGELOG.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          echo "artifact=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bulwark-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}
          retention-days: 1

  build-macos:
    name: build macos ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="bulwark-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/bulwark" "dist/${name}/"
          cp README.md LICENSE CHANGELOG.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" | awk '{print $1 "  " $2}' > "${name}.tar.gz.sha256" )
          echo "artifact=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bulwark-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}
          retention-days: 1

  publish:
    name: publish release to dist
    needs:
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify release asset set before publish
        # Fail the tag run before publishing if any expected dist asset is absent.
        run: |
          version="${GITHUB_REF_NAME#v}"
          targets=(
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-apple-darwin
            aarch64-apple-darwin
          )
          missing=0
          for target in "${targets[@]}"; do
            for suffix in .tar.gz .tar.gz.sha256; do
              asset="bulwark-${version}-${target}${suffix}"
              if [ ! -f "artifacts/${asset}" ]; then
                echo "::error::missing release asset ${asset}"
                missing=1
              fi
            done
          done
          exit "$missing"

      - name: Generate release notes
        # Install-first notes so the release page is usable on its own. The
        # version is templated from the tag, so every release gets current notes.
        run: |
          version="${GITHUB_REF_NAME#v}"
          # The heredoc body is indented to match this YAML block; strip that
          # leading indent so the emitted markdown starts at column 0 (otherwise
          # the code fences and tables would render as indented code blocks).
          sed 's/^          //' > notes.md <<NOTES
          **Bulwark ${GITHUB_REF_NAME}** — a kernel-boundary file-read gate for AI agent process trees. Linux (fanotify) & macOS (Endpoint Security).

          ## Install

          **Homebrew (recommended, Linux & macOS):**
          \`\`\`sh
          brew install obstalabs/tap/bulwark
          \`\`\`

          **macOS installer package (signed & notarized):**
          \`\`\`sh
          brew install --cask obstalabs/tap/bulwark
          \`\`\`

          **Manual download:** grab the archive for your platform below, then:
          \`\`\`sh
          tar xzf bulwark-${version}-<target>.tar.gz
          sudo install -m 0755 bulwark-${version}-<target>/bulwark /usr/local/bin/bulwark
          \`\`\`
          On macOS the archive also bundles the signed \`bulwark_es_gate.app\` (the Endpoint Security gate); keep it alongside the binary.

          ## Quick start
          \`\`\`sh
          # Run an agent, but deny it any read of your SSH keys — enforced by the kernel.
          sudo bulwark run --protect ~/.ssh -- claude
          \`\`\`

          ## Which archive?
          | Platform | Archive |
          |----------|---------|
          | Linux x86_64 | \`bulwark-${version}-x86_64-unknown-linux-gnu.tar.gz\` (or \`-musl\` for a static build) |
          | Linux aarch64 | \`bulwark-${version}-aarch64-unknown-linux-gnu.tar.gz\` (or \`-musl\`) |
          | macOS Apple Silicon | \`bulwark-${version}-aarch64-apple-darwin.tar.gz\` (or \`.pkg\`) |
          | macOS Intel | \`bulwark-${version}-x86_64-apple-darwin.tar.gz\` (or \`.pkg\`) |

          Every archive ships with a \`.sha256\` checksum. See the [README](https://github.com/obstalabs/bulwark#readme) for usage, the boundary model, and what Bulwark does **not** do.
          NOTES

      - name: Publish GitHub Release
        env:
          # In-repo release: the built-in token has contents:write here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$DIST_REPO" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            artifacts/*.tar.gz artifacts/*.sha256

      - name: Verify release assets
        # Make the release red if the published assets are not in lockstep.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          targets=(
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-apple-darwin
            aarch64-apple-darwin
          )
          gh release view "$GITHUB_REF_NAME" --repo "$DIST_REPO" --json assets --jq '.assets[].name' > assets.txt
          missing=0
          for target in "${targets[@]}"; do
            for suffix in .tar.gz .tar.gz.sha256; do
              asset="bulwark-${version}-${target}${suffix}"
              if ! grep -Fxq "$asset" assets.txt; then
                echo "::error::dist release ${GITHUB_REF_NAME} missing ${asset}"
                missing=1
              fi
            done
          done
          exit "$missing"
